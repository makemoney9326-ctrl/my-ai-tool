<!DOCTYPE html>
<html>
<head>
<title>Auto Reply Tool</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
color:red;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
margin:10px;
}

</style>

</head>

<body>

<h1>AUTO REPLY TOOL</h1>

<p>Set Auto Reply Message</p>

<input placeholder="Reply message">
<br>

<input placeholder="Trigger word">
<br>

<button onclick="save()">Save</button>

<script>

function save(){

let msg = document.querySelectorAll("input")[0].value;
let trig = document.querySelectorAll("input")[1].value;

localStorage.setItem("reply", msg);
localStorage.setItem("trigger", trig);

alert("Saved")

}

</script>

</body>
</html>
