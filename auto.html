<!DOCTYPE html>
<html>
<head>
<title>Auto Reply Tool</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
color:red;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
margin:10px;
}

</style>

</head>

<body>

<h1>AUTO REPLY TOOL</h1>

<p>Set Auto Reply Message</p>

<input id="reply" placeholder="Reply message">
<br>

<input id="trigger" placeholder="Trigger words (hi,hello,test)">
<br>

<button onclick="save()">Save</button>
<hr>

<h3>Test Comment</h3>


  
<input id="comment" placeholder="Type comment">
<br>
58 <button onclick="check()">Send</button>
<p id="result"></p>
<script>

function save(){


let msg = document.getElementById("reply").value;
let trig = document.getElementById("trigger").value;

localStorage.setItem("reply", msg);
localStorage.setItem("trigger", trig);

alert("Saved")

}
window.onload = function(){
let msg = localStorage.getItem("reply");
let trig = localStorage.getItem("trigger");
if(msg){
document.getElementById("reply").value = msg;
}

if(trig){
document.getElementById("trigger").value = trig;
}

}

function check(){

let comment = document.getElementById("comment").value;

let msg = localStorage.getItem("reply");
let trig = localStorage.getItem("trigger");

if(comment.includes(trig)){

document.getElementById("result").innerText = msg;

}else{

document.getElementById("result").innerText = "No reply";

}
}
</script>
</body>
</html>
